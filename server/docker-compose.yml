version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: esnaf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: esnaf_user
      POSTGRES_PASSWORD: esnaf_pass
      POSTGRES_DB: esnaf_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: esnaf-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres

volumes:
  pgdata: